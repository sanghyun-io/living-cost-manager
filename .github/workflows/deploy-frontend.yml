name: Deploy frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cf-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @living-cost-manager/web... test

      - name: Verify API base URL
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_API_BASE_URL" ]; then
            echo "NEXT_PUBLIC_API_BASE_URL repository variable is required." >&2
            exit 1
          fi

      - name: Build static site
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          # 온디바이스 AI 코치 모델(R2) 베이스 URL. 미설정 시 WebLLM 기본 CDN 사용.
          NEXT_PUBLIC_COACH_MODEL_BASE_URL: ${{ vars.NEXT_PUBLIC_COACH_MODEL_BASE_URL }}
        run: pnpm --filter @living-cost-manager/web... build

      # Run wrangler from an isolated dir via npx. Running it inside the repo
      # makes npm choke on the pnpm workspace ("Cannot read properties of null").
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          OUT_DIR="$(mktemp -d)/out"
          cp -r apps/web/out "$OUT_DIR"
          cd "$(dirname "$OUT_DIR")"
          npx --yes wrangler@4.42.0 pages deploy out \
            --project-name=living-cost-manager --branch=main
