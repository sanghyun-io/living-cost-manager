name: Deploy frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cf-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @living-cost-manager/web... test

      - name: Verify API base URL
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_API_BASE_URL" ]; then
            echo "NEXT_PUBLIC_API_BASE_URL repository variable is required." >&2
            exit 1
          fi

      - name: Build static site
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: pnpm --filter @living-cost-manager/web... build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Force npm so the action installs wrangler itself instead of trying
          # `pnpm exec wrangler` (wrangler is not a project dependency).
          packageManager: npm
          wranglerVersion: "4.42.0"
          command: pages deploy apps/web/out --project-name=living-cost-manager --branch=main
