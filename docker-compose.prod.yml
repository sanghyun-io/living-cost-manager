services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-living_cost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
      POSTGRES_DB: ${POSTGRES_DB:-living_cost_manager}
    volumes:
      - living_cost_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://living_cost:change-me-postgres-password@db:5432/living_cost_manager?schema=lcm}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://sanghyun-io.github.io}
    ports:
      - "${API_PORT:-4000}:4000"

volumes:
  living_cost_prod_pgdata:
