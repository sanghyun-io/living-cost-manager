services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env.oci
        required: true
    environment:
      NODE_ENV: production
      PORT: 4000
      API_BASE_PATH: /living-cost-manager/v1
      CORS_ORIGIN: https://sanghyun-io.github.io
    ports:
      - "127.0.0.1:4104:4000"
